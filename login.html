<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#1e1e1e;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
width:95%;
padding:10px;
background:#00bfff;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let username=document.getElementById("username").value;

sendTelegram(username);

alert("Login successful");

}

function sendTelegram(user){

const BOT_TOKEN="YOUR_BOT_TOKEN";
const CHAT_ID="YOUR_CHAT_ID";

let message=
"🔔 Login Notification\n"+
"User: "+user+"\n"+
"Time: "+new Date().toLocaleString();

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})

});

}

</script>

</body>
</html>
